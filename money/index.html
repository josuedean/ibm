<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Money Dashboard</title>
    <!-- build: 2026-03-26 -->
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="homeSection" class="panel">
        <header class="panel-header centered">
          <h1>Hot Potato</h1>
        </header>

        <div class="action-buttons">
          <button id="startReceivedBtn" class="action action-received">Record Cash Received</button>
          <button id="startSpentBtn" class="action action-spent">Record Cash Spent</button>
        </div>

        <section class="totals">
          <article class="total-card total-main">
            <h2>Total Cash (All-Time)</h2>
            <p id="totalCash" class="total-value total-green">₩0</p>
          </article>

          <div class="monthly-grid">
            <article class="total-card">
              <h3>This Month Received</h3>
              <p id="monthReceived" class="total-value total-light-green">₩0</p>
            </article>
            <article class="total-card">
              <h3>This Month Spent</h3>
              <p id="monthSpent" class="total-value total-light-red">₩0</p>
            </article>
          </div>
        </section>

        <p id="homeMessage" class="message" aria-live="polite"></p>
      </section>

      <section id="formSection" class="panel hidden">
        <header class="panel-header">
          <h1 id="formTitle">Record Transaction</h1>
          <p class="subtle">Only fields needed for this transaction are shown.</p>
        </header>

        <form id="transactionForm" novalidate>
          <div class="grid">
            <label>
              Receiver / Spender *
              <select id="person" required>
                <option value="">Select person</option>
                <option value="Josh">Josh</option>
                <option value="Victoria">Victoria</option>
              </select>
            </label>

            <label>
              <span id="counterpartyLabel">Payer / Payee *</span>
              <select id="counterparty" required>
                <option value="">Loading...</option>
              </select>
            </label>

            <label>
              Date &amp; Time (KST) *
              <input id="dateTime" type="datetime-local" required />
            </label>

            <label>
              Amount (KRW) *
              <input id="amount" type="number" min="1" step="1" inputmode="numeric" placeholder="10000" required />
            </label>

            <label>
              Description (Optional)
              <input id="description" type="text" maxlength="200" placeholder="Transaction details" />
            </label>
          </div>

          <div class="actions">
            <button type="button" id="openCounterpartyBtn" class="secondary">Add New Payer/Payee</button>
            <button type="button" id="cancelFormBtn" class="ghost">Back</button>
            <button type="submit" id="submitBtn">Submit Transaction</button>
          </div>
          <p id="formMessage" class="message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <div id="recordingOverlay" class="overlay hidden" role="status" aria-live="assertive">
      <div class="overlay-card">Recording Transaction...</div>
    </div>

    <dialog id="counterpartyDialog">
      <form id="counterpartyForm" method="dialog" novalidate>
        <h3>Add New Payer/Payee</h3>

        <label>
          Name *
          <input id="newCounterpartyName" type="text" maxlength="80" required />
        </label>

        <label>
          Category *
          <select id="newCounterpartyCategory" required>
            <option value="">Select category</option>
            <option value="tutee">Tutee (for Cash Received)</option>
            <option value="merchant">Merchant (for Cash Spent)</option>
          </select>
        </label>

        <label>
          Description *
          <input id="newCounterpartyDescription" type="text" maxlength="200" required />
        </label>

        <label>
          Phone Number *
          <input id="newCounterpartyPhone" type="tel" maxlength="25" placeholder="010-1234-5678" required />
        </label>

        <div class="actions">
          <button type="button" id="cancelCounterpartyBtn" class="secondary">Cancel</button>
          <button type="submit">Save Counterparty</button>
        </div>
        <p id="counterpartyMessage" class="message" aria-live="polite"></p>
      </form>
    </dialog>

    <script src="./config.js"></script>
    <script src="./api.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
